name: Refresh YouTube Cache

on:
  schedule:
    - cron: "17 19 * * *"   # 毎日 04:17 JST（= 19:17 UTC）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-youtube
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # --strict: API 失敗時はフォールバックせず workflow を失敗させる(通知のため)
      - name: Refresh YouTube cache
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          MAX_VIDEOS: ${{ vars.MAX_VIDEOS }}
        run: npm run refresh:youtube:ci

      - name: Commit updated cache
        id: commit
        run: |
          if git diff --quiet -- data/youtube-videos.json; then
            echo "No cache changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/youtube-videos.json
            git commit -m "chore: refresh YouTube cache"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Netlify がリポジトリ連携の auto-deploy を持つ場合、push だけでビルドされる。
      # 連携が無い構成でも確実にデプロイされるよう Build Hook も叩く(二重ビルドに
      # なる場合は Netlify 側で auto-deploy か本フックのどちらかを止めてよい)。
      - name: Trigger Netlify build
        if: steps.commit.outputs.pushed == 'true'
        env:
          URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Content-Type: application/json" \
            -d '{}' "$URL?trigger_title=scheduled%20youtube%20refresh"
