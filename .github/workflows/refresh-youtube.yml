name: Refresh YouTube Cache

on:
  schedule:
    - cron: "17 19 * * *"   # 毎日 04:17 JST（= 19:17 UTC）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-youtube
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # --strict: API 失敗時はフォールバックせず workflow を失敗させる(通知のため)
      - name: Refresh YouTube cache
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          MAX_VIDEOS: ${{ vars.MAX_VIDEOS }}
        run: npm run refresh:youtube:ci

      # デプロイは Netlify のリポジトリ連携 auto-deploy に任せる(push されれば
      # 自動でビルドされる。2026-06-12 に本番で動作確認済み)。
      - name: Commit updated cache
        run: |
          if git diff --quiet -- data/youtube-videos.json; then
            echo "No cache changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/youtube-videos.json
            git commit -m "chore: refresh YouTube cache"
            git push
          fi
